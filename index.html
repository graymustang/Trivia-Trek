<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!--For mobile devices, might add more functionality later-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Trek</title>
    <link rel="icon" href="images/purple_question_mark.png" type="image/png">
    <link rel="stylesheet" href="styles/styles.css" type="text/css">
    <script src="js/main.js" defer></script>
</head>

<body>
    <div id="welcome" class="text-container">
        <h1>Welcome!</h1>
        <p class="text-wrapper">This is <strong>Trivia Trek</strong>, a great game to test your trivia knowledge! You will have 5 questions.</p>
        <p class="text-wrapper">To begin, please select a difficulty and category.</p>
        
    

        <div class="text-wrapper">
            <label for="difficulty">Difficulty Level:</label>
            <select id="difficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>

        <div class="text-wrapper">
            <label for="category">Category:</label>
            <select id="category">
                <option value="9">General Knowledge</option>
                <option value="17">Science</option>
                <option value="18">Science: Computers</option>
                <option value="23">History</option>
                <option value="21">Sports</option>
                <option value="27">Animals</option>
                <option value="28">Vehicles</option>
            </select>
        </div>

        <p class="text-wrapper">When you are ready, press <strong>Start Game.</strong> Good luck!</p>
        <button class="startButton" id="startButton">Start Game</button>
        </div>

        <div id="game" class="text-container" style="display: none">
            <!-- This will be filled in with js, after the game has started-->
        </div>

</body>
</html>
